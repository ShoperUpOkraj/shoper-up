<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierwsza strona</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@300;600&family=Poppins:wght@300;600&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" hret="css/reset.css">   
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <section class="body_header">
            <h1>Lista zakupów</h1>
        </section>
    </header>
    <main>
        <section class="body_main">
            <div class="container">
                <div class="container_header owoce_img">
                    <h2>OWOCE</h2>
                </div>
                <div class="container_main">
                    <ul>
                        <li>Jabłka</li>
                        <li>Pomarańcze</li>
                        <li>Kiwi</li>
                    </ul>
                </div>
                <div class="container_footer">
                    <label for="owoce">Owoce kupione</label>
                    <input type="checkbox" id="owoce">
                </div>
            </div>
            <div class="container">
                <div class="container_header warzywa_img">
                    <h2>WARZYWA</h2>
                </div>
                <div class="container_main">
                    <ul>
                        <li>Sałata</li>
                        <li>Ogórek</li>
                        <ul>
                            <li>Kiszony</li>
                            <li>Świeży</li>
                        </ul>
                        <li>Marchew</li>
                    </ul>
                </div>
                <div class="container_footer">
                    <label for="warzywa">Warzywa kupione</label>
                    <input type="checkbox" id="warzywa">
                </div>
            </div>
            <div class="container">
                <div class="container_header nabial_img">
                    <h2>NABIAŁ</h2>
                </div>
                <div class="container_main">
                    <ul>
                        <li>Mleko</li>
                        <li>Twaróg</li>
                        <li>Ser</li>
                        <ul>
                            <li>Żółty</li>
                            <li>Camembert</li>
                        </ul>
                    </ul>
                </div>
                <div class="container_footer">
                    <label for="nabial">Nabiał kupiony</label>
                    <input type="checkbox" id="nabial">
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>Made with <i class="fa fa-heart"></i> 2022</p>
    </footer>
</body>
</html>
